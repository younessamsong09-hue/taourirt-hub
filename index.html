<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Taourirt Hub | دليل مدينة تاوريرت</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="hub-header">
      <div class="logo">
        <h1>TAOURIRT <span>HUB</span></h1>
        <p>دليل مدينة تاوريرت - خدمات صحية وتجارية</p>
      </div>
      <div class="stats">
        <div class="stat"><span id="stat-markets">0</span> سوق</div>
        <div class="stat"><span id="stat-pharmacies">0</span> صيدلية</div>
        <div class="stat"><span id="stat-visitors">0</span> زائر</div>
      </div>
    </header>

    <!-- Quick Actions -->
    <div class="quick-actions">
      <button id="bloodBtn"><i class="fas fa-tint"></i> التبرع بالدم <span id="bloodCount">0</span></button>
      <button id="lostBtn"><i class="fas fa-search"></i> المفقودات <span id="lostCount">0</span></button>
      <button id="jobsBtn"><i class="fas fa-briefcase"></i> وظائف تاوريرت <span id="jobsCount">0</span></button>
    </div>

    <!-- Search -->
    <div class="search-bar">
      <i class="fas fa-search"></i>
      <input type="text" id="searchInput" placeholder="بحث في الصيدليات...">
    </div>

    <!-- Pharmacy Section -->
    <div class="pharmacy-container">
      <div class="pharmacy-header">
        <h2><i class="fas fa-prescription-bottle"></i> الصيدليات</h2>
        <div class="open-stats">🟢 المفتوحة الآن: <span id="openCount">0</span></div>
      </div>

      <!-- Neighborhood Filters -->
      <div class="neighborhood-filters" id="neighborhoodFilters"></div>

      <!-- Map & List -->
      <div class="pharmacy-grid">
        <div id="map" class="pharmacy-map"></div>
        <div id="pharmaciesList" class="pharmacies-list"></div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
