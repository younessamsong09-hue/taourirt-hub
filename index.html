<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAOURIRT HUB</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f172a;
            color: white;
            padding: 20px;
        }
        .header {
            background: linear-gradient(135deg, #3b82f6, #06b6d4);
            padding: 20px;
            text-align: center;
            border-radius: 20px;
            margin-bottom: 20px;
        }
        .card {
            background: #1e293b;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 10px;
        }
        .duty-card {
            background: #ef4444;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
        }
        .btn {
            display: inline-block;
            background: white;
            color: #ef4444;
            padding: 10px 20px;
            border-radius: 30px;
            text-decoration: none;
            margin-top: 10px;
        }
        .phone-link {
            color: #22d3ee;
            text-decoration: none;
        }
        .section-title {
            color: #22d3ee;
            margin: 20px 0 10px;
            font-size: 20px;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #94a3b8;
        }
        .status-on { color: #22c55e; }
        .status-off { color: #ef4444; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🏥 TAOURIRT HUB</h1>
        <p>دليل مدينة تاوريرت - خدمات صحية وتجارية</p>
    </div>

    <div class="container" style="max-width: 550px; margin: auto;">
        <div id="duty-container"><div class="loading">⏳ جاري التحميل...</div></div>

        <div class="section-title">📋 الصيدليات</div>
        <div id="pharmacies-container"><div class="loading">⏳ جاري التحميل...</div></div>

        <div class="section-title">🛒 الأسواق والمحلات</div>
        <div id="markets-container"><div class="loading">⏳ جاري التحميل...</div></div>
    </div>

    <div style="text-align:center; margin-top:30px; padding:20px; color:#64748b;">
        تاوريرت هب - دليل المدينة الرقمي
    </div>

    <script>
        const SUPABASE_URL = 'https://pyxeusrxoizjlihyqhac.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_u1vYpwFYhvou2oyvsxoNIQ_1WDklzXt';

        async function loadData() {
            try {
                // جلب الصيدليات
                const pharmRes = await fetch(`${SUPABASE_URL}/rest/v1/pharmacies?select=*`, {
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
                });
                const pharmacies = await pharmRes.json();

                // جلب الأسواق
                const marketRes = await fetch(`${SUPABASE_URL}/rest/v1/markets?select=*`, {
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
                });
                const markets = await marketRes.json();

                // صيدلية الحراسة
                const duty = pharmacies.find(p => p.is_on_duty === true);
                if (duty) {
                    document.getElementById('duty-container').innerHTML = `
                        <div class="duty-card">
                            <h3>🚨 صيدلية الحراسة الآن</h3>
                            <h2>${duty.name}</h2>
                            <p>${duty.address || ''}</p>
                            <a href="tel:${duty.phone}" class="btn">📞 اتصل الآن</a>
                        </div>
                    `;
                } else {
                    document.getElementById('duty-container').innerHTML = '<div class="card">⚠️ لا توجد صيدلية حراسة اليوم</div>';
                }

                // عرض الصيدليات
                if (pharmacies.length === 0) {
                    document.getElementById('pharmacies-container').innerHTML = '<div class="card">📭 لا توجد صيدليات مسجلة</div>';
                } else {
                    document.getElementById('pharmacies-container').innerHTML = pharmacies.map(p => `
                        <div class="card">
                            <h3>🏪 ${p.name}</h3>
                            <p>📍 ${p.address || 'العنوان غير متوفر'}</p>
                            <p>📞 <a href="tel:${p.phone}" class="phone-link">${p.phone || 'رقم غير متوفر'}</a></p>
                            <span class="${p.is_on_duty ? 'status-on' : 'status-off'}">${p.is_on_duty ? '🟢 متوفر' : '⚪ غير متوفر'}</span>
                        </div>
                    `).join('');
                }

                // عرض الأسواق
                if (markets.length === 0) {
                    document.getElementById('markets-container').innerHTML = '<div class="card">📭 لا توجد أسواق مسجلة</div>';
                } else {
                    document.getElementById('markets-container').innerHTML = markets.map(m => `
                        <div class="card">
                            <h3>🛍️ ${m.name}</h3>
                            <p>📍 ${m.address || 'العنوان غير متوفر'}</p>
                            <p>📞 <a href="tel:${m.phone}" class="phone-link">${m.phone || 'رقم غير متوفر'}</a></p>
                        </div>
                    `).join('');
                }

            } catch (error) {
                console.error('خطأ:', error);
                document.getElementById('duty-container').innerHTML = '<div class="card">⚠️ خطأ في الاتصال بقاعدة البيانات</div>';
            }
        }

        loadData();
    </script>
</body>
</html>
