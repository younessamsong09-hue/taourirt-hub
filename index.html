<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAOURIRT HUB</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="header">
        <h1>🏥 TAOURIRT HUB</h1>
        <p>دليل مدينة تاوريرت - خدمات صحية وتجارية</p>
    </div>

    <div class="container" style="max-width: 550px; margin: auto;">
        <!-- الإحصائيات -->
        <div class="stats-row">
            <div class="stat-card"><div class="number" id="visitorCount">0</div><div class="label">👁️ زائر</div></div>
            <div class="stat-card"><div class="number" id="pharmacyCount">0</div><div class="label">🏥 صيدلية</div></div>
            <div class="stat-card"><div class="number" id="marketCount">0</div><div class="label">🛒 سوق</div></div>
        </div>

        <!-- التبرع بالدم (قابل للطي) -->
        <div class="toggle-card">
            <div class="toggle-header" onclick="toggleBlood()">
                <div class="toggle-icon"><i class="fas fa-tint"></i></div>
                <div class="toggle-title">التبرع بالدم</div>
                <div class="toggle-count" id="bloodCount">0</div>
                <div class="toggle-arrow"><i id="bloodArrow" class="fas fa-chevron-down"></i></div>
            </div>
            <div id="bloodContent" class="toggle-content" style="display:none;">
                <div class="toggle-buttons">
                    <button class="toggle-btn" onclick="showBloodReg()">🩸 سجل متبرع</button>
                    <button class="toggle-btn-emergency" onclick="showBloodEmer()">🚨 حالة استعجالية</button>
                </div>
                <div id="bloodReg" style="display:none; margin-top:6px;">
                    <input type="text" id="donorName" placeholder="الاسم" class="toggle-input">
                    <input type="tel" id="donorPhone" placeholder="الهاتف" class="toggle-input">
                    <select id="donorBlood" class="toggle-input"><option>فصيلة الدم</option><option>A+</option><option>A-</option><option>B+</option><option>B-</option><option>AB+</option><option>AB-</option><option>O+</option><option>O-</option></select>
                    <button onclick="addDonor()" class="toggle-submit">تسجيل</button>
                </div>
                <div id="bloodEmer" style="display:none; margin-top:6px;">
                    <input type="text" id="emergPatient" placeholder="اسم المريض" class="toggle-input">
                    <select id="emergBlood" class="toggle-input"><option>فصيلة الدم</option><option>A+</option><option>A-</option><option>B+</option><option>B-</option><option>AB+</option><option>AB-</option><option>O+</option><option>O-</option></select>
                    <input type="tel" id="emergPhone" placeholder="رقم التواصل" class="toggle-input">
                    <button onclick="addEmergency()" class="toggle-submit-emergency">نشر 🚨</button>
                </div>
                <div id="donorsList" class="toggle-list"></div>
                <div id="emergList" class="toggle-list"></div>
            </div>
        </div>

        <!-- المفقودات والموجودات (قابل للطي) -->
        <div class="toggle-card">
            <div class="toggle-header" onclick="toggleLostFound()">
                <div class="toggle-icon"><i class="fas fa-search"></i></div>
                <div class="toggle-title">المفقودات والموجودات</div>
                <div class="toggle-count" id="lostCount">0</div>
                <div class="toggle-arrow"><i id="lostArrow" class="fas fa-chevron-down"></i></div>
            </div>
            <div id="lostFoundContent" class="toggle-content" style="display:none;">
                <div class="toggle-buttons">
                    <button class="toggle-btn-lost" onclick="showLostForm()">📦 أضف مفقود</button>
                    <button class="toggle-btn-found" onclick="showFoundForm()">🎁 أضف موجود</button>
                </div>
            <div id="lostForm" style="display:none; margin-top:8px;">
                <input type="text" id="lostTitle" placeholder="العنوان *" class="toggle-input">
                <textarea id="lostDesc" placeholder="الوصف *" rows="2" class="toggle-input"></textarea>
                <input type="text" id="lostPlace" placeholder="المكان" class="toggle-input">
                <input type="tel" id="lostPhone" placeholder="رقم الهاتف *" class="toggle-input">
                <label class="btn-cam" for="reportFloatImage">📷 إرفاق صورة للمشكلة</label><input type="file" id="reportFloatImage" accept="image/*" style="display:none" onchange="previewImage(this)"><img id="reportImgPreview" style="display:none; border-radius:8px; margin-bottom:10px;">
                <img id="lostPreview" style="display:none; width:100%; max-height:160px; border-radius:15px; margin:10px 0; object-fit:cover; border:2px dashed #6366f1;">
                <img id="lostPreview" style="display:none; width:100%; max-height:150px; border-radius:12px; margin-top:10px; object-fit:cover; border:2px solid #ef4444;">
                <button onclick="addLost()" class="toggle-submit-lost">نشر</button>
            </div>
            <div id="foundForm" style="display:none; margin-top:8px;">
                <input type="text" id="foundTitle" placeholder="العنوان *" class="toggle-input">
                <textarea id="foundDesc" placeholder="الوصف *" rows="2" class="toggle-input"></textarea>
                <input type="text" id="foundPlace" placeholder="المكان" class="toggle-input">
                <input type="tel" id="foundPhone" placeholder="رقم الهاتف *" class="toggle-input">
                <label class="btn-cam" for="reportFloatImage">📷 إرفاق صورة للمشكلة</label><input type="file" id="reportFloatImage" accept="image/*" style="display:none" onchange="previewImage(this)"><img id="reportImgPreview" style="display:none; border-radius:8px; margin-bottom:10px;">
                <img id="foundPreview" style="display:none; width:100%; max-height:160px; border-radius:15px; margin:10px 0; object-fit:cover; border:2px dashed #10b981;">
                <img id="foundPreview" style="display:none; width:100%; max-height:150px; border-radius:12px; margin-top:10px; object-fit:cover; border:2px solid #10b981;">
                <button onclick="addFound()" class="toggle-submit-found">نشر</button>
            </div>
                <div id="lostList" class="toggle-list"></div>
                <div id="foundList" class="toggle-list"></div>
            </div>
        </div>

        <!-- وظائف (قابل للطي) -->
        <div class="toggle-card">
            <div class="toggle-header" onclick="toggleJobs()">
                <div class="toggle-icon"><i class="fas fa-briefcase"></i></div>
                <div class="toggle-title">وظائف تاوريرت</div>
                <div class="toggle-count" id="jobsCount">0</div>
                <div class="toggle-arrow"><i id="jobsArrow" class="fas fa-chevron-down"></i></div>
            </div>
            <div id="jobsContent" class="toggle-content" style="display:none;">
                <div id="jobs-control" style="margin-bottom:20px;">
                    <button onclick="toggleJobForm()" style="width:100%; background:linear-gradient(135deg, #6366f1, #3b82f6); color:white; border:none; padding:14px; border-radius:16px; font-weight:bold; cursor:pointer; box-shadow: 0 10px 15px -3px rgba(59,130,246,0.3); transition: transform 0.2s;">
                        <i class="fas fa-plus-circle"></i> إضافة فرصة عمل جديدة
                    </button>
                </div>
                <div id="addJobForm" style="display:none; background:#1e293b; padding:20px; border-radius:20px; border:1px solid #3b82f6; margin-bottom:25px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);">
                    <h3 style="color:white; margin-bottom:15px; text-align:center; font-size:16px;">تفاصيل الوظيفة</h3>
                    <input type="text" id="newJobTitle" placeholder="المسمى الوظيفي (مثلاً: نجار)" style="width:100%; padding:12px; margin-bottom:10px; border-radius:10px; border:1px solid #334155; background:#0f172a; color:white;">
                    <input type="text" id="newJobCompany" placeholder="المكان أو اسم المحل" style="width:100%; padding:12px; margin-bottom:10px; border-radius:10px; border:1px solid #334155; background:#0f172a; color:white;">
                    <input type="number" id="newJobPhone" placeholder="رقم الواتساب (06...)" style="width:100%; padding:12px; margin-bottom:15px; border-radius:10px; border:1px solid #334155; background:#0f172a; color:white;">
                    <button onclick="saveNewJob()" style="width:100%; background:#10b981; color:white; border:none; padding:12px; border-radius:10px; font-weight:bold;">نشر العرض الآن ✅</button>
                </div>
                <div id="jobsList" style="display:grid; gap:15px;"></div>
                <div id="addJobForm" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); width:90%; background:#2f3542; padding:20px; border-radius:20px; border:2px solid #ff4757; z-index:9999; box-shadow: 0 0 50px rgba(0,0,0,0.8);">
                    <h3 style="color:#ff4757; text-align:center; margin-bottom:15px;">إضافة سريعة (تجريبي)</h3>
                    <input type="text" id="newJobTitle" placeholder="شنو هي الخدمة؟" style="width:100%; padding:10px; margin-bottom:10px; border-radius:10px; border:none; background:#57606f; color:white;">
                    <input type="text" id="newJobCompany" placeholder="فين بلاصة؟" style="width:100%; padding:10px; margin-bottom:10px; border-radius:10px; border:none; background:#57606f; color:white;">
                    <input type="number" id="newJobPhone" placeholder="رقم الهاتف" style="width:100%; padding:10px; margin-bottom:15px; border-radius:10px; border:none; background:#57606f; color:white;">
                    <button onclick="saveNewJob()" style="width:100%; background:#2ed573; color:white; border:none; padding:12px; border-radius:10px; font-weight:bold;">أنشرها دابا ✅</button>
                    <button onclick="toggleJobForm()" style="width:100%; background:transparent; color:#ced4da; border:none; margin-top:10px;">إلغاء</button>
                </div>
                <button onclick="toggleJobForm()" id="mainAddJobBtn" style="width:100%; background:linear-gradient(135deg, #3b82f6, #2563eb); color:white; border:none; padding:12px; border-radius:12px; margin-bottom:15px; font-weight:bold; cursor:pointer; box-shadow: 0 4px 10px rgba(59,130,246,0.3);">
                    <i class="fas fa-plus-circle"></i> أنشر وظيفة جديدة
                </button>
                <div id="addJobForm" style="display:none; background:#1e293b; padding:15px; border-radius:15px; border:1px solid #334155; margin-bottom:20px; box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);">
                    <input type="text" id="newJobTitle" placeholder="مثال: حلاق، سائق، بائع..." style="width:100%; padding:10px; margin-bottom:10px; border-radius:8px; border:1px solid #475569; background:#0f172a; color:white;">
                    <input type="text" id="newJobCompany" placeholder="اسم المحل أو المقاولة" style="width:100%; padding:10px; margin-bottom:10px; border-radius:8px; border:1px solid #475569; background:#0f172a; color:white;">
                    <input type="number" id="newJobPhone" placeholder="رقم الواتساب (06...)" style="width:100%; padding:10px; margin-bottom:12px; border-radius:8px; border:1px solid #475569; background:#0f172a; color:white;">
                    <button onclick="saveNewJob()" style="width:100%; background:#22c55e; color:white; border:none; padding:12px; border-radius:8px; font-weight:bold; cursor:pointer;">تأكيد النشر فوراً</button>
                </div>
                <div id="jobsList"></div>
            </div>
        </div>

        <!-- بحث -->
        <div class="search-box"><i class="fas fa-search"></i><input type="text" id="searchInput" placeholder="🔍 بحث..."><button id="clearSearch" class="search-clear" style="display:none;">✖</button></div>
        <div class="filter-buttons">
            <button id="showAllBtn" class="filter-btn active">📋 جميع الصيدليات</button>
            <button id="showOpenBtn" class="filter-btn">🟢 المفتوحة الآن</button>
        </div>
        <div id="neighborhoods-container"></div>
        <div id="map-container"><div id="map"></div></div>
        <div id="duty-container"><div class="loading">⏳</div></div>
        <div class="section-title">📋 الصيدليات <span id="pharmCount"></span></div>
        <div id="pharmacies-container"><div class="loading">⏳</div></div>
        <div class="section-title">🛒 الأسواق</div>
        <div id="markets-container"><div class="loading">⏳</div></div>
    </div>

    <div class="footer">❤️ تاوريرت هب</div>



<style id="social-style">
    .social-feed { max-height: 450px; overflow-y: auto; padding: 10px; }
    .post-card { background: #1a1a1a; border-radius: 15px; margin-bottom: 20px; border: 1px solid #333; overflow: hidden; }
    .card-pothole { border-right: 5px solid #ff4757; }
    .card-light { border-right: 5px solid #f1c40f; }
    .post-img { width: 100%; height: 200px; object-fit: cover; }
    .post-content { padding: 15px; color: white; }
    .post-actions { display: flex; gap: 15px; border-top: 1px solid #2c3e50; padding-top: 10px; margin-top: 10px; }
    .action-btn { color: #3498db; font-size: 0.9em; cursor: pointer; font-weight: bold; }
<script id="social-logic">
    const Modules = {
        pothole: (r) => `<div class="post-card card-pothole">${r.image_url ? `<img src="${r.image_url}" class="post-img">` : ""}<div class="post-content"><small style="color:#ff4757">🕳️ حفرة</small><p style="margin:8px 0">${r.description || "بدون وصف"}</p><div class="post-actions"><span class="action-btn" style="color:#e74c3c">❤️ إعجاب</span><span class="action-btn">💬 تعليق</span></div></div></div>`,
        light: (r) => `<div class="post-card card-light">${r.image_url ? `<img src="${r.image_url}" class="post-img">` : ""}<div class="post-content"><small style="color:#f1c40f">💡 إنارة</small><p style="margin:8px 0">${r.description || "بدون وصف"}</p><div class="post-actions"><span class="action-btn" style="color:#e74c3c">❤️ إعجاب</span><span class="action-btn">💬 تعليق</span></div></div></div>`
    };
    async function fetchLatestReports() {
        const { data, error } = await supabase.from("reports").select("*").order("created_at", { ascending: false }).limit(10);
        const list = document.getElementById("reportFloatList");
        if (error || !list) return;
        list.innerHTML = data.map(r => Modules[r.type] ? Modules[r.type](r) : `<div class="post-card" style="padding:15px;color:white;">⚠️ ${r.description}</div>`).join("");
    }
    <script src="js/complaints.js"></script>
</body>
</html>
    <!-- مساعد تاوريرت الذكي -->
    <div id="assistantBtn" style="position:fixed; bottom:20px; left:20px; width:55px; height:55px; background:linear-gradient(135deg,#3b82f6,#06b6d4); border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; z-index:999; box-shadow:0 4px 15px rgba(59,130,246,0.4);">
        <i class="fas fa-robot" style="font-size:28px; color:white;"></i>
    </div>
    
    <div id="assistantPanel" style="position:fixed; bottom:90px; left:20px; width:350px; height:500px; background:#1e293b; border-radius:20px; display:none; flex-direction:column; z-index:1000; overflow:hidden; border:1px solid #334155;">
        <div style="background:#0f172a; padding:12px 15px; display:flex; justify-content:space-between; border-bottom:1px solid #334155;">
            <span style="color:#22d3ee;"><i class="fas fa-robot"></i> مساعد تاوريرت الذكي</span>
            <span id="closeAssistant" style="cursor:pointer; color:#94a3b8;">✖</span>
        </div>
        <div id="assistantMessages" style="flex:1; overflow-y:auto; padding:12px; display:flex; flex-direction:column; gap:8px;">
            <div style="background:#334155; align-self:flex-start; padding:8px 12px; border-radius:15px; max-width:85%; font-size:13px;">
                مرحبا! اسألني بالدارجة:<br>
                • شنو هي صيدلية الحراسة؟<br>
                • دلني على صيدلية الجابري<br>
                • أقرب صيدلية ليا
            </div>
        </div>
        <div style="display:flex; padding:10px; gap:8px; border-top:1px solid #334155;">
            <button id="micBtn" style="background:#3b82f6; border:none; width:38px; height:38px; border-radius:50%; color:white; cursor:pointer;"><i class="fas fa-microphone"></i></button>
            <input type="text" id="assistantInput" placeholder="اسقسي بالدارجة..." style="flex:1; padding:8px 12px; background:#0f172a; border:1px solid #334155; border-radius:25px; color:white; font-size:13px;">
            <button id="sendBtn" style="background:#3b82f6; border:none; width:38px; height:38px; border-radius:50%; color:white; cursor:pointer;"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>
    <!-- أيقونة التبليغ العائمة -->
    <div id="reportFloatBtn" class="float-btn report-float" onclick="toggleReportFloat()">
        <i class="fas fa-exclamation-triangle"></i>
    </div>
    <div id="reportFloatPanel" class="float-panel" style="display:none;">
        <div class="float-header">
            <span>تبليغ عن مشكلة</span>
            <span onclick="toggleReportFloat()" style="cursor:pointer;">✖</span>
        </div>
        <div class="float-buttons">
            <button onclick="startReportFloat('pothole')">🕳️ حفرة</button>
            <button onclick="startReportFloat('light')">💡 إنارة</button>
            <button onclick="startReportFloat('garbage')">🗑️ نفايات</button>
        </div>
        <div id="reportFloatForm" style="display:none;">
            <textarea id="reportFloatDesc" rows="2" placeholder="الوصف" class="float-input"></textarea>
            <label class="btn-cam" for="reportFloatImage">📷 إرفاق صورة للمشكلة</label><input type="file" id="reportFloatImage" accept="image/*" style="display:none" onchange="previewImage(this)"><img id="reportImgPreview" style="display:none; border-radius:8px; margin-bottom:10px;">
            <div id="reportFloatLocation" class="float-location"></div>
            <button onclick="addReportFloat()" class="float-submit">إرسال</button>
        </div>
        <div id="reportFloatList"></div>
    </div>

    <!-- أيقونة الكراء العائمة -->
    <div id="rentalFloatBtn" class="float-btn rental-float" onclick="toggleRentalFloat()">
        <i class="fas fa-home"></i>
    </div>
    <div id="rentalFloatPanel" class="float-panel" style="display:none;">
        <div class="float-header">
            <span>كراء وعقارات</span>
            <span onclick="toggleRentalFloat()" style="cursor:pointer;">✖</span>
        </div>
        <div class="float-buttons">
            <button onclick="showRentalFloatForm('rent')">🏠 للكراء</button>
            <button onclick="showRentalFloatForm('sale')">💰 للبيع</button>
            <button onclick="showRentalFloatForm('land')">🌾 أرض</button>
        </div>
        <div id="rentalFloatForm" style="display:none;">
            <input type="text" id="rentalFloatTitle" placeholder="العنوان" class="float-input">
            <textarea id="rentalFloatDesc" rows="2" placeholder="الوصف" class="float-input"></textarea>
            <input type="text" id="rentalFloatPrice" placeholder="السعر" class="float-input">
            <select id="rentalFloatNeighborhood" class="float-input">
                <option>الحي</option><option>وسط المدينة</option><option>حي المسيرة</option>
                <option>حي السلام</option><option>حي التعاون</option>
            </select>
            <input type="tel" id="rentalFloatPhone" placeholder="الهاتف" class="float-input">
            <label class="btn-cam" for="reportFloatImage">📷 إرفاق صورة للمشكلة</label><input type="file" id="reportFloatImage" accept="image/*" style="display:none" onchange="previewImage(this)"><img id="reportImgPreview" style="display:none; border-radius:8px; margin-bottom:10px;">
            <button onclick="addRentalFloat()" class="float-submit">نشر</button>
        </div>
        <div class="float-filters">
            <select id="filterFloatType" onchange="showRentalFloatList()"><option value="all">الكل</option><option value="rent">للكراء</option><option value="sale">للبيع</option><option value="land">أرض</option></select>
        </div>
        <div id="rentalFloatList"></div>
    </div>
