<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAOURIRT HUB</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="header">
        <h1>🏥 TAOURIRT HUB</h1>
        <p>دليل مدينة تاوريرت - خدمات صحية وتجارية</p>
    </div>

    <div class="container" style="max-width: 550px; margin: auto;">
        <!-- الصف العلوي: إحصائيات + وظائف -->
        <div class="top-row">
            <div class="stats-bar">
                <div class="stat-card">
                    <div class="number" id="visitorCount">0</div>
                    <div class="label"><i class="fas fa-eye"></i> زائر</div>
                </div>
                <div class="stat-card">
                    <div class="number" id="pharmacyCount">0</div>
                    <div class="label"><i class="fas fa-hospital-user"></i> صيدلية</div>
                </div>
                <div class="stat-card">
                    <div class="number" id="marketCount">0</div>
                    <div class="label"><i class="fas fa-store"></i> سوق</div>
                </div>
            </div>
            
            <!-- بطاقة الوظائف -->
            <div class="jobs-card" onclick="toggleJobs()">
                <div class="jobs-icon"><i class="fas fa-briefcase"></i></div>
                <div class="jobs-info">
                    <div class="jobs-title">وظائف</div>
                    <div class="jobs-count" id="jobsCount">0</div>
                </div>
                <div class="jobs-arrow"><i id="jobsArrow" class="fas fa-chevron-down"></i></div>
            </div>
        </div>

        <!-- القائمة المنسدلة للوظائف -->
        <div id="jobsDropdown" style="display: none;">
            <div id="jobsList"></div>
        </div>

        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="🔍 بحث بالاسم أو الحي أو الهاتف...">
            <button id="clearSearch" class="search-clear" style="display: none;">✖</button>
        </div>

        <div id="neighborhoods-container"></div>

        <div id="map-container" style="background:#1e293b; border-radius:20px; padding:12px; margin-bottom:20px;">
            <div id="map" style="height:200px; border-radius:16px;"></div>
        </div>

        <div id="duty-container"><div class="loading">⏳ جاري التحميل...</div></div>

        <div class="section-title">📋 الصيدليات <span id="pharmCount" style="font-size: 14px;"></span></div>
        <div id="pharmacies-container"><div class="loading">⏳ جاري التحميل...</div></div>

        <div class="section-title">🛒 الأسواق والمحلات</div>
        <div id="markets-container"><div class="loading">⏳ جاري التحميل...</div></div>
    </div>

    <div class="footer">
        ❤️ تاوريرت هب - دليل المدينة الرقمي ❤️
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/config.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/map.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/main.js"></script>
    <script src="js/jobs.js"></script>
</body>
</html>
