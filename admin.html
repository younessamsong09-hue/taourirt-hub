<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - تاوريرت هب</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f172a;
            color: white;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: auto; }
        h1 { color: #22d3ee; margin-bottom: 20px; }
        .tabs {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .tab-btn {
            background: #1e293b;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
        }
        .tab-btn.active { background: #3b82f6; }
        .tab-content { display: none; background: #1e293b; border-radius: 20px; padding: 20px; }
        .tab-content.active { display: block; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; text-align: right; border-bottom: 1px solid #334155; }
        th { color: #22d3ee; }
        button {
            background: #3b82f6;
            border: none;
            padding: 5px 12px;
            border-radius: 15px;
            color: white;
            cursor: pointer;
            margin: 0 3px;
        }
        .btn-add {
            background: #22c55e;
            margin-bottom: 15px;
            display: inline-block;
        }
        .btn-delete { background: #ef4444; }
        .btn-duty { background: #f59e0b; }
        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 10px;
            color: white;
        }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: #1e293b;
            padding: 25px;
            border-radius: 20px;
            width: 90%;
            max-width: 450px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }
        .stat-card {
            background: #0f172a;
            padding: 20px;
            border-radius: 16px;
            text-align: center;
        }
        .stat-number { font-size: 32px; font-weight: bold; color: #22d3ee; }
    </style>
</head>
<body>
    <div class="container">
        <h1><i class="fas fa-cog"></i> لوحة تحكم تاوريرت هب</h1>
        
        <div class="tabs">
            <button class="tab-btn active" data-tab="pharmacies">الصيدليات</button>
            <button class="tab-btn" data-tab="markets">الأسواق</button>
            <button class="tab-btn" data-tab="jobs">الوظائف</button>
            <button class="tab-btn" data-tab="complaints">الشكاوى</button>
            <button class="tab-btn" data-tab="stats">الإحصائيات</button>
        </div>

        <div id="pharmacies" class="tab-content active"></div>
        <div id="markets" class="tab-content"></div>
        <div id="jobs" class="tab-content"></div>
        <div id="complaints" class="tab-content"></div>
        <div id="stats" class="tab-content"></div>
    </div>

    <div id="modal" style="display:none" class="modal"></div>

    <script>
        let pharmacies = JSON.parse(localStorage.getItem('taourirt_pharmacies')) || [
            { id: 1, name: 'صيدلية الجابري', address: '77 شارع مولاي عبد الله', phone: '0536699222', is_on_duty: true },
            { id: 2, name: 'صيدلية تاوريرت', address: '578 شارع سمراء', phone: '0536698018', is_on_duty: false }
        ];
        let markets = JSON.parse(localStorage.getItem('taourirt_markets')) || [
            { id: 1, name: 'سوق تاوريرت المركزي', address: 'شارع الحسن الثاني', phone: '0536123464' }
        ];
        let jobs = JSON.parse(localStorage.getItem('taourirt_jobs')) || [
            { id: 1, title: 'صيدلي', company: 'صيدلية الجابري', phone: '0536699222' }
        ];
        let complaints = JSON.parse(localStorage.getItem('complaints')) || [];

        function save() {
            localStorage.setItem('taourirt_pharmacies', JSON.stringify(pharmacies));
            localStorage.setItem('taourirt_markets', JSON.stringify(markets));
            localStorage.setItem('taourirt_jobs', JSON.stringify(jobs));
            localStorage.setItem('complaints', JSON.stringify(complaints));
        }

        function renderPharmacies() {
            let html = `<button class="btn-add" onclick="showAdd('pharmacy')">+ إضافة صيدلية</button><table>`;
            html += `<tr><th>الاسم</th><th>العنوان</th><th>الهاتف</th><th>حراسة</th><th>إجراءات</th></tr>`;
            pharmacies.forEach(p => {
                html += `<tr>
                    <td>${p.name}</td>
                    <td>${p.address || ''}</td>
                    <td>${p.phone || ''}</td>
                    <td>${p.is_on_duty ? '🟢 نعم' : '⚪ لا'}</td>
                    <td>
                        <button onclick="setDuty(${p.id})">حراسة</button>
                        <button onclick="editItem('pharmacy', ${p.id})">تعديل</button>
                        <button onclick="deleteItem('pharmacy', ${p.id})">حذف</button>
                    </td>
                </tr>`;
            });
            html += `</table>`;
            document.getElementById('pharmacies').innerHTML = html;
        }

        function renderMarkets() {
            let html = `<button class="btn-add" onclick="showAdd('market')">+ إضافة سوق</button><table>`;
            html += `<tr><th>الاسم</th><th>العنوان</th><th>الهاتف</th><th>إجراءات</th></tr>`;
            markets.forEach(m => {
                html += `<tr>
                    <td>${m.name}</td>
                    <td>${m.address || ''}</td>
                    <td>${m.phone || ''}</td>
                    <td>
                        <button onclick="editItem('market', ${m.id})">تعديل</button>
                        <button onclick="deleteItem('market', ${m.id})">حذف</button>
                    </td>
                </tr>`;
            });
            html += `</table>`;
            document.getElementById('markets').innerHTML = html;
        }

        function renderJobs() {
            let html = `<button class="btn-add" onclick="showAdd('job')">+ إضافة وظيفة</button><table>`;
            html += `<tr><th>المسمى</th><th>المؤسسة</th><th>الهاتف</th><th>إجراءات</th></tr>`;
            jobs.forEach(j => {
                html += `<tr>
                    <td>${j.title}</td>
                    <td>${j.company}</td>
                    <td>${j.phone || ''}</td>
                    <td>
                        <button onclick="editItem('job', ${j.id})">تعديل</button>
                        <button onclick="deleteItem('job', ${j.id})">حذف</button>
                    </td>
                </tr>`;
            });
            html += `</table>`;
            document.getElementById('jobs').innerHTML = html;
        }

        function renderComplaints() {
            if (complaints.length === 0) {
                document.getElementById('complaints').innerHTML = '<p>لا توجد شكاوى</p>';
                return;
            }
            let html = `<table><tr><th>العنوان</th><th>الاسم</th><th>النوع</th><th>الحالة</th><th>إجراءات</th></tr>`;
            complaints.forEach(c => {
                html += `<tr>
                    <td>${c.title}</td>
                    <td>${c.name}</td>
                    <td>${c.type === 'complaint' ? 'شكوى' : 'اقتراح'}</td>
                    <td>${c.status || 'قيد المعالجة'}</td>
                    <td>
                        <button onclick="updateStatus(${c.id}, 'completed')">حل</button>
                        <button onclick="deleteItem('complaint', ${c.id})">حذف</button>
                    </td>
                </tr>`;
            });
            html += `</table>`;
            document.getElementById('complaints').innerHTML = html;
        }

        function renderStats() {
            document.getElementById('stats').innerHTML = `
                <div class="stats-grid">
                    <div class="stat-card"><div class="stat-number">${pharmacies.length}</div><div>صيدليات</div></div>
                    <div class="stat-card"><div class="stat-number">${markets.length}</div><div>أسواق</div></div>
                    <div class="stat-card"><div class="stat-number">${jobs.length}</div><div>وظائف</div></div>
                    <div class="stat-card"><div class="stat-number">${complaints.length}</div><div>شكاوى</div></div>
                    <div class="stat-card"><div class="stat-number">${pharmacies.filter(p => p.is_on_duty).length}</div><div>حراسة اليوم</div></div>
                </div>
            `;
        }

        function setDuty(id) {
            pharmacies = pharmacies.map(p => ({ ...p, is_on_duty: p.id === id }));
            save();
            renderPharmacies();
            alert('تم تعيين صيدلية الحراسة');
        }

        function deleteItem(type, id) {
            if (!confirm('هل أنت متأكد؟')) return;
            if (type === 'pharmacy') pharmacies = pharmacies.filter(p => p.id !== id);
            if (type === 'market') markets = markets.filter(m => m.id !== id);
            if (type === 'job') jobs = jobs.filter(j => j.id !== id);
            if (type === 'complaint') complaints = complaints.filter(c => c.id !== id);
            save();
            renderAll();
        }

        function updateStatus(id, status) {
            complaints = complaints.map(c => c.id === id ? { ...c, status } : c);
            save();
            renderComplaints();
        }

        function showAdd(type) {
            let modal = document.getElementById('modal');
            if (type === 'pharmacy') {
                modal.innerHTML = `<div class="modal-content">
                    <h3>إضافة صيدلية</h3>
                    <input id="name" placeholder="الاسم"><input id="address" placeholder="العنوان"><input id="phone" placeholder="الهاتف">
                    <button onclick="addPharmacy()">إضافة</button><button onclick="closeModal()">إلغاء</button>
                </div>`;
            }
            if (type === 'market') {
                modal.innerHTML = `<div class="modal-content">
                    <h3>إضافة سوق</h3>
                    <input id="name" placeholder="الاسم"><input id="address" placeholder="العنوان"><input id="phone" placeholder="الهاتف">
                    <button onclick="addMarket()">إضافة</button><button onclick="closeModal()">إلغاء</button>
                </div>`;
            }
            if (type === 'job') {
                modal.innerHTML = `<div class="modal-content">
                    <h3>إضافة وظيفة</h3>
                    <input id="title" placeholder="المسمى"><input id="company" placeholder="المؤسسة"><input id="phone" placeholder="الهاتف">
                    <button onclick="addJob()">إضافة</button><button onclick="closeModal()">إلغاء</button>
                </div>`;
            }
            modal.style.display = 'flex';
        }

        function addPharmacy() {
            let name = document.getElementById('name').value;
            if (!name) return;
            pharmacies.push({ id: Date.now(), name, address: document.getElementById('address').value, phone: document.getElementById('phone').value, is_on_duty: false });
            save();
            closeModal();
            renderPharmacies();
        }

        function addMarket() {
            let name = document.getElementById('name').value;
            if (!name) return;
            markets.push({ id: Date.now(), name, address: document.getElementById('address').value, phone: document.getElementById('phone').value });
            save();
            closeModal();
            renderMarkets();
        }

        function addJob() {
            let title = document.getElementById('title').value;
            if (!title) return;
            jobs.push({ id: Date.now(), title, company: document.getElementById('company').value, phone: document.getElementById('phone').value });
            save();
            closeModal();
            renderJobs();
        }

        function editItem(type, id) {
            if (type === 'pharmacy') {
                let p = pharmacies.find(p => p.id === id);
                let newName = prompt('الاسم الجديد:', p.name);
                if (newName) p.name = newName;
                let newAddress = prompt('العنوان الجديد:', p.address);
                if (newAddress) p.address = newAddress;
                let newPhone = prompt('الهاتف الجديد:', p.phone);
                if (newPhone) p.phone = newPhone;
            }
            if (type === 'market') {
                let m = markets.find(m => m.id === id);
                let newName = prompt('الاسم الجديد:', m.name);
                if (newName) m.name = newName;
                let newAddress = prompt('العنوان الجديد:', m.address);
                if (newAddress) m.address = newAddress;
                let newPhone = prompt('الهاتف الجديد:', m.phone);
                if (newPhone) m.phone = newPhone;
            }
            if (type === 'job') {
                let j = jobs.find(j => j.id === id);
                let newTitle = prompt('المسمى الجديد:', j.title);
                if (newTitle) j.title = newTitle;
                let newCompany = prompt('المؤسسة الجديدة:', j.company);
                if (newCompany) j.company = newCompany;
                let newPhone = prompt('الهاتف الجديد:', j.phone);
                if (newPhone) j.phone = newPhone;
            }
            save();
            renderAll();
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        function renderAll() {
            renderPharmacies();
            renderMarkets();
            renderJobs();
            renderComplaints();
            renderStats();
        }

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(btn.dataset.tab).classList.add('active');
            };
        });

        renderAll();
    </script>
</body>
</html>
